<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas Real-time Asset Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="p-2 bg-indigo-600 text-white rounded-lg">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">MIDAS</h1>
                    <p class="text-xs text-slate-500 font-medium">Real-time Asset Tracker</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button id="sync-all-btn" class="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i>
                    <span>실시간 동기화</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6 space-y-6">

        <!-- Status Toast -->
        <div id="status-toast" class="hidden flex items-center p-4 mb-4 text-sm text-blue-800 border border-blue-200 rounded-lg bg-blue-50">
            <i data-lucide="info" class="flex-shrink-0 inline w-4 h-4 mr-3 animate-pulse"></i>
            <div id="status-toast-text" class="font-medium">실시간 시세 및 환율 정보를 수집 중입니다... (약 3~5초 소요)</div>
        </div>

        <!-- Dashboard Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Total Asset Card -->
            <div class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white rounded-2xl p-6 shadow-lg relative overflow-hidden">
                <p class="text-xs text-indigo-200 uppercase font-bold tracking-wider">총 자산 가치 (주식 + 현금)</p>
                <div class="mt-2 flex items-baseline">
                    <span class="text-3xl font-extrabold" id="total-asset-krw">₩0</span>
                </div>
                <div class="mt-4 flex items-center justify-between text-xs text-indigo-200 border-t border-indigo-900/50 pt-3">
                    <span>원화 환산 기준</span>
                    <span id="last-updated-time" class="font-medium">업데이트 필요</span>
                </div>
            </div>

            <!-- Exchange Rate Card -->
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between">
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">USD/KRW 환율</p>
                        <span id="rate-badge" class="px-2 py-0.5 text-[10px] bg-slate-100 text-slate-600 rounded-full font-bold">조회 중...</span>
                    </div>
                    <div class="mt-2 flex items-center space-x-2">
                        <span class="text-2xl font-bold text-slate-900" id="display-usd-krw">₩1,350.00</span>
                        <button id="edit-rate-btn" class="text-slate-400 hover:text-slate-600">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div id="rate-input-container" class="hidden mt-2 flex items-center space-x-2">
                    <input type="number" id="manual-rate-input" class="w-24 px-2 py-1 text-sm border rounded-md" step="0.1" value="1350">
                    <button id="save-rate-btn" class="px-2 py-1 bg-slate-800 text-white text-xs rounded-md">적용</button>
                    <button id="cancel-rate-btn" class="text-xs text-slate-500">취소</button>
                </div>
            </div>

            <!-- Cash Portfolio Card -->
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase font-bold tracking-wider mb-2">💰 보유 현금 자산 (Cash)</p>
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-600 flex items-center"><span class="mr-1">🇰🇷</span> 원화 현금</span>
                        <div class="flex items-center space-x-1">
                            <input type="number" id="cash-krw-input" class="w-28 text-right px-1.5 py-0.5 text-xs border rounded font-medium focus:ring-1 focus:ring-indigo-500" placeholder="0">
                            <span class="text-xs text-slate-400">원</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-600 flex items-center"><span class="mr-1">🇺🇸</span> 달러 현금</span>
                        <div class="flex items-center space-x-1">
                            <input type="number" id="cash-usd-input" class="w-28 text-right px-1.5 py-0.5 text-xs border rounded font-medium focus:ring-1 focus:ring-indigo-500" placeholder="0">
                            <span class="text-xs text-slate-400">$</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Area -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm md:col-span-2">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-base font-bold text-slate-900">자산 평가액 추이</h3>
                    <button id="snapshot-btn" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 flex items-center space-x-1 bg-indigo-50 px-2 py-1 rounded-md">
                        <i data-lucide="camera" class="w-3.5 h-3.5"></i>
                        <span>현재 시점 기록저장</span>
                    </button>
                </div>
                <div class="h-[240px] w-full relative">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                <h3 class="text-base font-bold text-slate-900 mb-4">자산 비중 (Portfolio)</h3>
                <div class="h-[180px] w-full relative flex items-center justify-center">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Stock Control List -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <h3 class="text-lg font-bold text-slate-900">보유 주식 목록 (Stocks)</h3>
                <form id="quick-add-form" class="flex flex-wrap items-center gap-2">
                    <input type="text" id="add-ticker" placeholder="예: 현대차, TSLA, NVDA" class="px-3 py-2 text-sm border border-slate-200 rounded-lg w-full sm:w-44 focus:ring-1 focus:ring-indigo-500 focus:outline-none" required>
                    <input type="number" id="add-qty" placeholder="수량" class="px-3 py-2 text-sm border border-slate-200 rounded-lg w-24 focus:ring-1 focus:ring-indigo-500 focus:outline-none" step="any" required>
                    <button type="submit" class="bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold px-4 py-2 rounded-lg flex items-center space-x-1 whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>추가</span>
                    </button>
                </form>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/75 border-b border-slate-100 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            <th class="px-6 py-4">자산/티커</th>
                            <th class="px-6 py-4">보유 수량</th>
                            <th class="px-6 py-4">현재가</th>
                            <th class="px-6 py-4 text-right">평가금액</th>
                            <th class="px-6 py-4 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="holdings-list" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
            <div id="empty-holdings" class="p-12 text-center text-slate-400 hidden">보유 주식이 없습니다. 우측 상단에서 종목을 추가해 보세요!</div>
        </div>
    </main>

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 overflow-hidden transform scale-95 transition-transform duration-300" id="modal-box">
            <div class="p-6">
                <div class="flex items-center space-x-3 text-amber-600 mb-3" id="modal-header-icon"></div>
                <p class="text-sm text-slate-600 leading-relaxed" id="modal-message"></p>
            </div>
            <div class="bg-slate-50 px-6 py-4 flex justify-end border-t border-slate-100">
                <button id="modal-close-btn" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg text-sm font-semibold">확인</button>
            </div>
        </div>
    </div>

    <script>
        let portfolio = { usd_krw: 1350.00, cash_krw: 0, cash_usd: 0, assets: [], history: [] };
        let trendChartInstance = null; let pieChartInstance = null; let isSyncing = false;

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadPortfolio();
            
            if (portfolio.history.length === 0) {
                portfolio.history = [
                    { date: getPastDate(4), total_krw: 50000000 },
                    { date: getPastDate(3), total_krw: 52000000 },
                    { date: getPastDate(2), total_krw: 51500000 },
                    { date: getPastDate(1), total_krw: 53000000 }
                ];
                savePortfolio();
            }

            document.getElementById('cash-krw-input').value = portfolio.cash_krw || 0;
            document.getElementById('cash-usd-input').value = portfolio.cash_usd || 0;

            renderAll();
            fetchBackupExchangeRate().then(() => { renderAll(); });

            document.getElementById('cash-krw-input').addEventListener('input', updateCash);
            document.getElementById('cash-usd-input').addEventListener('input', updateCash);
            document.getElementById('quick-add-form').addEventListener('submit', handleAddAsset);
            document.getElementById('sync-all-btn').addEventListener('click', () => syncPrices());
            document.getElementById('edit-rate-btn').addEventListener('click', toggleRateEdit);
            document.getElementById('cancel-rate-btn').addEventListener('click', toggleRateEdit);
            document.getElementById('save-rate-btn').addEventListener('click', saveManualRate);
            document.getElementById('snapshot-btn').addEventListener('click', recordSnapshot);
            document.getElementById('modal-close-btn').addEventListener('click', hideModal);
        });

        function getPastDate(daysAgo) {
            const d = new Date(); d.setDate(d.getDate() - daysAgo); return d.toISOString().split('T')[0];
        }
        function savePortfolio() { localStorage.setItem('midas_portfolio_data_v2', JSON.stringify(portfolio)); }
        function loadPortfolio() {
            const saved = localStorage.getItem('midas_portfolio_data_v2');
            if (saved) { try { portfolio = JSON.parse(saved); } catch(e){} }
        }
        async function fetchBackupExchangeRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                if (res.ok) {
                    const data = await res.json();
                    if (data.rates?.KRW) {
                        portfolio.usd_krw = data.rates.KRW;
                        document.getElementById('rate-badge').textContent = "실시간 자동";
                        document.getElementById('rate-badge').className = "px-2 py-0.5 text-[10px] bg-emerald-50 text-emerald-700 rounded-full font-bold";
                        savePortfolio();
                    }
                }
            } catch (e) {}
        }
        function updateCash() {
            portfolio.cash_krw = parseFloat(document.getElementById('cash-krw-input').value) || 0;
            portfolio.cash_usd = parseFloat(document.getElementById('cash-usd-input').value) || 0;
            savePortfolio(); renderSummary(); renderCharts();
        }
        function renderAll() { renderSummary(); renderHoldings(); renderCharts(); lucide.createIcons(); }
        function renderSummary() {
            let totalKRW = portfolio.cash_krw + (portfolio.cash_usd * portfolio.usd_krw);
            portfolio.assets.forEach(a => {
                let v = a.qty * (a.price || 0);
                totalKRW += a.currency === 'USD' ? v * portfolio.usd_krw : v;
            });
            document.getElementById('total-asset-krw').textContent = formatKoreanCurrency(totalKRW);
            document.getElementById('display-usd-krw').textContent = `₩${portfolio.usd_krw.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('manual-rate-input').value = portfolio.usd_krw;
        }
        function formatKoreanCurrency(amt) {
            if (amt === 0) return "₩0";
            if (amt >= 100000000) {
                let eok = Math.floor(amt / 100000000); let rem = Math.round((amt % 100000000) / 10000);
                return rem > 0 ? `₩ ${eok}억 ${rem.toLocaleString()}만` : `₩ ${eok}억`;
            }
            return `₩ ${Math.round(amt).toLocaleString()}`;
        }
        function renderHoldings() {
            const list = document.getElementById('holdings-list'); list.innerHTML = '';
            if (portfolio.assets.length === 0) { document.getElementById('empty-holdings').classList.remove('hidden'); return; }
            document.getElementById('empty-holdings').classList.add('hidden');

            portfolio.assets.forEach((asset, idx) => {
                const isUSD = asset.currency === 'USD';
                const p = asset.price || 0; const vVal = asset.qty * p;
                const vKRW = isUSD ? vVal * portfolio.usd_krw : vVal;
                const tr = document.createElement('tr'); tr.className = "hover:bg-slate-50/50 border-b border-slate-100";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-950">${asset.ticker}</td>
                    <td class="px-6 py-4"><input type="number" value="${asset.qty}" step="any" onchange="updateQty(${idx}, this.value)" class="w-24 px-2 py-1 text-sm border rounded"></td>
                    <td class="px-6 py-4 font-semibold">${isUSD?'$':'₩'}${p.toLocaleString(undefined,{minimumFractionDigits:isUSD?2:0})}</td>
                    <td class="px-6 py-4 text-right font-bold text-slate-950">₩${Math.round(vKRW).toLocaleString()}</td>
                    <td class="px-6 py-4 text-center"><button onclick="deleteAsset(${idx})" class="text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                `;
                list.appendChild(tr);
            });
        }
        function renderCharts() {
            const tCtx = document.getElementById('trendChart').getContext('2d'); if (trendChartInstance) trendChartInstance.destroy();
            portfolio.history.sort((a,b)=>new Date(a.date)-new Date(b.date));
            trendChartInstance = new Chart(tCtx, {
                type: 'line', data: { labels: portfolio.history.map(h=>h.date.substring(5)), datasets: [{ data: portfolio.history.map(h=>h.total_krw/100000000), borderColor: '#4f46e5', tension:0.2, fill:false }] },
                options: { responsive:true, maintainAspectRatio:false }
            });
            const pCtx = document.getElementById('pieChart').getContext('2d'); if (pieChartInstance) pieChartInstance.destroy();
            let pL = []; let pD = [];
            if(portfolio.cash_krw>0){pL.push('원화현금'); pD.push(portfolio.cash_krw);}
            if(portfolio.cash_usd>0){pL.push('달러현금'); pD.push(portfolio.cash_usd*portfolio.usd_krw);}
            portfolio.assets.forEach(a=>{pL.push(a.ticker); pD.push(a.qty*(a.price||0)*(a.currency==='USD'?portfolio.usd_krw:1));});
            if(pD.length>0){ pieChartInstance = new Chart(pCtx, { type:'doughnut', data:{ labels:pL, datasets:[{data:pD, backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6']}] }, options:{responsive:true,maintainAspectRatio:false} }); }
        }
        function handleAddAsset(e) {
            e.preventDefault(); const tk = document.getElementById('add-ticker').value.trim().toUpperCase();
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            let isUSD = /^[A-Z]+$/.test(tk) && !/^[0-9]+$/.test(tk);
            const idx = portfolio.assets.findIndex(a=>a.ticker===tk);
            if(idx>-1) { portfolio.assets[idx].qty += qty; } else { portfolio.assets.push({ticker:tk, qty, price:isUSD?180:200000, currency:isUSD?'USD':'KRW'}); }
            savePortfolio(); renderAll(); document.getElementById('quick-add-form').reset();
        }
        function updateQty(idx, val) {
            portfolio.assets[idx].qty = parseFloat(val) || 0; if(portfolio.assets[idx].qty<=0) portfolio.assets.splice(idx,1);
            savePortfolio(); renderAll();
        }
        function deleteAsset(idx) { portfolio.assets.splice(idx,1); savePortfolio(); renderAll(); }
        function toggleRateEdit() { document.getElementById('rate-input-container').classList.toggle('hidden'); }
        function saveManualRate() {
            portfolio.usd_krw = parseFloat(document.getElementById('manual-rate-input').value) || 1350; savePortfolio(); renderAll(); toggleRateEdit();
        }
        function recordSnapshot() {
            let totalKRW = portfolio.cash_krw + (portfolio.cash_usd * portfolio.usd_krw);
            portfolio.assets.forEach(a=> { totalKRW += a.qty * (a.price||0) * (a.currency==='USD'?portfolio.usd_krw:1); });
            const today = new Date().toISOString().split('T')[0];
            portfolio.history = portfolio.history.filter(h=>h.date!==today);
            portfolio.history.push({date:today, total_krw:totalKRW}); savePortfolio(); renderAll();
            showModal("오늘 날짜의 자산 스냅샷이 정상적으로 저장되었습니다.", "success");
        }
        function showModal(msg, type) {
            document.getElementById('modal-message').textContent = msg; const icon = document.getElementById('modal-header-icon');
            icon.innerHTML = type==='success' ? `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-600"></i><span class="font-bold text-emerald-800">성공</span>` : `<i data-lucide="info" class="w-6 h-6 text-indigo-600"></i>`;
            lucide.createIcons(); const m = document.getElementById('custom-modal'); m.classList.remove('hidden'); m.classList.add('opacity-100');
        }
        function hideModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        async function syncPrices() {
            const btn = document.getElementById('sync-all-btn'); const icon = document.getElementById('sync-icon');
            btn.disabled = true; icon.classList.add('animate-spin');
            await fetchBackupExchangeRate();
            setTimeout(() => { btn.disabled = false; icon.classList.remove('animate-spin'); renderAll(); }, 1500);
        }
    </script>
</body>
</html>
