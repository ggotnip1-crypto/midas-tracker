<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas Real-time Asset Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="p-2 bg-indigo-600 text-white rounded-lg">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">MIDAS</h1>
                    <p class="text-xs text-slate-500 font-medium">Real-time Asset Tracker</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button id="sync-all-btn" class="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i>
                    <span>실시간 동기화</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6 space-y-6">

        <!-- Status Toast -->
        <div id="status-toast" class="hidden flex items-center p-4 mb-4 text-sm text-blue-800 border border-blue-200 rounded-lg bg-blue-50" role="alert">
            <i data-lucide="info" class="flex-shrink-0 inline w-4 h-4 mr-3 animate-pulse"></i>
            <div id="status-toast-text" class="font-medium">구글 검색을 통해 실시간 시세 및 환율 정보를 수집 중입니다... (약 3~5초 소요)</div>
        </div>

        <!-- Dashboard Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Total Asset Card -->
            <div class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white rounded-2xl p-6 shadow-lg relative overflow-hidden">
                <p class="text-xs text-indigo-200 uppercase font-bold tracking-wider">총 자산 가치 (주식 + 현금)</p>
                <div class="mt-2 flex items-baseline">
                    <span class="text-3xl font-extrabold" id="total-asset-krw">₩0</span>
                </div>
                <div class="mt-4 flex items-center justify-between text-xs text-indigo-200 border-t border-indigo-900/50 pt-3">
                    <span>원화 환산 기준</span>
                    <span id="last-updated-time" class="font-medium">업데이트 필요</span>
                </div>
            </div>

            <!-- Exchange Rate Card -->
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between">
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">USD/KRW 환율</p>
                        <span id="rate-badge" class="px-2 py-0.5 text-[10px] bg-slate-100 text-slate-600 rounded-full font-bold">조회 중...</span>
                    </div>
                    <div class="mt-2 flex items-center space-x-2">
                        <span class="text-2xl font-bold text-slate-900" id="display-usd-krw">₩1,350.00</span>
                        <button id="edit-rate-btn" class="text-slate-400 hover:text-slate-600">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div id="rate-input-container" class="hidden mt-2 flex items-center space-x-2">
                    <input type="number" id="manual-rate-input" class="w-24 px-2 py-1 text-sm border rounded-md" step="0.1" value="1350">
                    <button id="save-rate-btn" class="px-2 py-1 bg-slate-800 text-white text-xs rounded-md">적용</button>
                    <button id="cancel-rate-btn" class="text-xs text-slate-500">취소</button>
                </div>
            </div>

            <!-- Cash Portfolio Card -->
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase font-bold tracking-wider mb-2">💰 보유 현금 자산 (Cash)</p>
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
